name: Deploy to GitHub Pages

on:
  # Deploy on tagged releases only (current configuration)
  # Tag pattern: v* (e.g., v1.0.0, v2.1.3)
  push:
    tags:
      - "v*"

  # Option: Deploy on every push to main branch
  # Uncomment the following lines and comment out the tags trigger above to enable
  # push:
  #   branches:
  #     - main

  # Allow manual workflow trigger
  workflow_dispatch:

# Sets permissions for GITHUB_TOKEN to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Updated to 22 LTS to satisfy package.json engines field
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build Astro site
        run: pnpm build
        env:
          # Set base path for GitHub Pages deployment
          # Site will be available at: https://krugar.github.io/wunschnachbarn-website/
          # For custom domain, set this to "/" and configure CNAME in public/
          BASE_PATH: /wunschnachbarn-website

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
